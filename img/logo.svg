<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .crown-stroke { 
        fill: none; 
        stroke: #ff6b35; 
        stroke-width: 5; 
        stroke-linecap: round; 
        stroke-linejoin: round;
        transition: stroke 0.4s ease, filter 0.4s ease;
      }
      .crown-fill { 
        fill: #ff6b35;
        transition: fill 0.4s ease, filter 0.4s ease;
      }
      .text-main { 
        font-family: Arial, sans-serif; 
        font-weight: 900; 
        font-size: 56px; 
        fill: #ff6b35; 
        letter-spacing: 3; 
        text-anchor: middle;
        transition: fill 0.4s ease, filter 0.4s ease;
      }
      .text-sub { 
        font-family: Arial, sans-serif; 
        font-weight: 600; 
        font-size: 13px; 
        fill: #ff6b35; 
        letter-spacing: 2; 
        text-anchor: middle;
        transition: fill 0.4s ease;
      }
      .line { 
        stroke: #ff6b35; 
        stroke-width: 1.5;
        transition: stroke 0.4s ease;
      }
      
      /* Hover effects */
      svg:hover .crown-stroke {
        stroke: #4f8cff;
        filter: drop-shadow(0 0 8px rgba(79, 140, 255, 0.6));
      }
      svg:hover .crown-fill {
        fill: #4f8cff;
        filter: drop-shadow(0 0 6px rgba(79, 140, 255, 0.5));
      }
      svg:hover .text-main {
        fill: #4f8cff;
        filter: drop-shadow(0 0 4px rgba(79, 140, 255, 0.4));
      }
      svg:hover .text-sub {
        fill: #5a9aff;
      }
      svg:hover .line {
        stroke: #4f8cff;
      }
    </style>
  </defs>
  
  <!-- Crown -->
  <g id="crown">
    <!-- Left sharp peak -->
    <path d="M 80 160 L 110 70 L 130 120" class="crown-stroke"/>
    
    <!-- Left-center peak -->
    <path d="M 130 120 L 150 50 L 170 110" class="crown-stroke"/>
    
    <!-- Center peak (highest) -->
    <path d="M 170 110 L 200 15 L 230 110" class="crown-stroke"/>
    
    <!-- Right-center peak -->
    <path d="M 230 110 L 250 50 L 270 120" class="crown-stroke"/>
    
    <!-- Right sharp peak -->
    <path d="M 270 120 L 290 70 L 320 160" class="crown-stroke"/>
    
    <!-- Crown points - circles at peaks -->
    <circle cx="110" cy="70" r="5" class="crown-fill"/>
    <circle cx="150" cy="50" r="5" class="crown-fill"/>
    <circle cx="200" cy="15" r="7" class="crown-fill"/>
    <circle cx="250" cy="50" r="5" class="crown-fill"/>
    <circle cx="290" cy="70" r="5" class="crown-fill"/>
    
    <!-- Crown band/base -->
    <rect x="80" y="155" width="240" height="22" rx="3" class="crown-fill"/>
    
    <!-- Crown band dots -->
    <circle cx="100" cy="166" r="2.5" fill="white"/>
    <circle cx="125" cy="166" r="2.5" fill="white"/>
    <circle cx="150" cy="166" r="2.5" fill="white"/>
    <circle cx="175" cy="166" r="2.5" fill="white"/>
    <circle cx="200" cy="166" r="2.5" fill="white"/>
    <circle cx="225" cy="166" r="2.5" fill="white"/>
    <circle cx="250" cy="166" r="2.5" fill="white"/>
    <circle cx="275" cy="166" r="2.5" fill="white"/>
    <circle cx="300" cy="166" r="2.5" fill="white"/>
  </g>
  
  <!-- Top line -->
  <line x1="90" y1="195" x2="310" y2="195" class="line"/>
  
  <!-- Text: AMAXIMUM (in triangular/mountain style) -->
  <g id="main-text">
    <!-- Create triangular effect by arranging letters -->
    <text x="200" y="245" class="text-main">AMAXIMUM</text>
  </g>
  
  <!-- Middle line -->
  <line x1="110" y1="258" x2="290" y2="258" class="line"/>
  
  <!-- Text: CONSTRUCTION -->
  <text x="200" y="278" class="text-sub">CONSTRUCTION</text>
</svg>