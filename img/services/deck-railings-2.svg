<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Deck railings - glass railing illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.6" stop-color="#eef2f7"/>
      <stop offset="1" stop-color="#e6eaf0"/>
    </linearGradient>
    <linearGradient id="gl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f8cff" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#4f8cff" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shine" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- deck surface -->
  <g stroke="#121826" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M160 560 L1040 560" stroke-width="14"/>
    <path d="M210 604 L990 604" stroke-width="10" opacity="0.35"/>
    <path d="M240 646 L960 646" stroke-width="10" opacity="0.25"/>

    <!-- posts -->
    <path d="M260 560 L260 290" stroke-width="16"/>
    <path d="M600 560 L600 290" stroke-width="16"/>
    <path d="M940 560 L940 290" stroke-width="16"/>

    <!-- top rail -->
    <path d="M260 300 L940 300" stroke-width="16"/>
  </g>

  <!-- glass panels -->
  <g filter="url(#shine)">
    <rect x="282" y="318" width="290" height="226" rx="10" fill="url(#gl)" stroke="#4f8cff" stroke-opacity="0.25" stroke-width="4"/>
    <rect x="618" y="318" width="300" height="226" rx="10" fill="url(#gl)" stroke="#4f8cff" stroke-opacity="0.25" stroke-width="4"/>

    <!-- reflection streaks -->
    <path d="M330 330 L430 540" stroke="#ffffff" stroke-opacity="0.35" stroke-width="10" stroke-linecap="round"/>
    <path d="M690 330 L800 540" stroke="#ffffff" stroke-opacity="0.32" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- subtle label plate -->
  <g>
    <rect x="86" y="96" width="420" height="92" rx="18" fill="#ffffff" stroke="#e6eaf0"/>
    <path d="M120 142 h22" stroke="#ff6b35" stroke-width="10" stroke-linecap="round"/>
    <path d="M162 142 h22" stroke="#4f8cff" stroke-width="10" stroke-linecap="round"/>
    <text x="208" y="152" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#121826">Glass Railings</text>
  </g>
</svg>
